<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="index.css" rel="stylesheet">
    <title>Ajmera Classes</title>
</head>
<script>
    function includeHTML() {
      var z, i, elmnt, file, xhttp;
      /* Loop through a collection of all HTML elements: */
      z = document.getElementsByTagName("*");
      for (i = 0; i < z.length; i++) {
        elmnt = z[i];
        /*search for elements with a certain atrribute:*/
        file = elmnt.getAttribute("w3-include-html");
        if (file) {
          /* Make an HTTP request using the attribute value as the file name: */
          xhttp = new XMLHttpRequest();
          xhttp.onreadystatechange = function() {
            if (this.readyState == 4) {
              if (this.status == 200) {elmnt.innerHTML = this.responseText;}
              if (this.status == 404) {elmnt.innerHTML = "Page not found.";}
              /* Remove the attribute, and call this function once more: */
              elmnt.removeAttribute("w3-include-html");
              includeHTML();
            }
          }
          xhttp.open("GET", file, true);
          xhttp.send();
          /* Exit the function: */
          return;
        }
      }
    }
    </script>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
    <div class="container-fluid" style="padding-top: 10px; padding-left: 30;">
        <nav class="navbar navbar-expand-lg">
            <a class="navbar-brand" href="">

            </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon" style="color: white;"></span>
                </button>
                
                <div class="collapse navbar-collapse justify-content-end" id="navbarSupportedContent">
                    <!-- Nav tabs -->
                    <ul class="navbar-nav nav nav-tab ">
                        <li class="nav-item" >
                            <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home"
                                type="button" role="tab" aria-controls="home" aria-selected="true">Home</button>
                        </li>
                        <li class="nav-item" >
                            <button class="nav-link" id="aboutUs-tab" data-bs-toggle="tab" data-bs-target="#aboutUs"
                                type="button" role="tab" aria-controls="aboutUs" aria-selected="false">About Us</button>
                        </li>
                        <li class="nav-item" >
                            <button class="nav-link" id="courses-tab" data-bs-toggle="tab" data-bs-target="#courses"
                                type="button" role="tab" aria-controls="courses"

                        <li class="nav-item" >

                                type="button" role="tab" aria-controls="ContactUs"
                                aria-selected="false">Contact Us</button>
                        </li>
                    </ul>
                    <!-- Tab panes -->
                </div>
        </nav>
        <div class="tab-content">
            <div class="tab-pane active" id="home" role="tabpanel" aria-labelledby="home-tab">
                <div w3-include-html="home.html"></div> 
            </div>
            <div class="tab-pane" id="aboutUs" role="tabpanel" aria-labelledby="aboutUs-tab">Page2</div>
            <div class="tab-pane" id="courses" role="tabpanel" aria-labelledby="courses-tab">Page3</div>
            <div class="tab-pane" id="ContactUs" role="tabpanel" aria-labelledby="ContactUs-tab">
                <div w3-include-html="contact-us.html" class="contact-us"></div> 
            </div>
        </div>

    </div>
    <script>
        includeHTML();
        </script>
</body>

</html>
